name: Bug report
description: Report a defect, broken behavior, or documentation issue.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: repo
    attributes:
      label: Repository
      description: Which repository is affected?
      options:
        - .github
        - aptitude-server
        - aptitude-client
        - aptitude-docs
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem clearly and concretely.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: List the steps to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add logs, screenshots, request payloads, versions, or links if relevant.
