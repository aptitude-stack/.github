name: Feature request
description: Propose a feature, improvement, or workflow change.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: repo
    attributes:
      label: Repository
      description: Which repository would this primarily affect?
      options:
        - .github
        - aptitude-server
        - aptitude-client
        - aptitude-docs
        - cross-repo
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the change you want.
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Boundary notes
      description: Call out any server, client, publisher, or docs ownership implications.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
